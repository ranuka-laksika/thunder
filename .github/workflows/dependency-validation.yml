name: Dependency Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/go.mod'
      - '**/go.sum'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-go-dependencies:
    name: Validate Go Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Thunder repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect modified go.mod files
        id: detect-changes
        run: |
          # Get the base branch SHA
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Comparing $BASE_SHA...$HEAD_SHA"

          # Find all go.mod files that were modified
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA | grep 'go.mod$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No go.mod files were modified"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Modified go.mod files:"
            echo "$CHANGED_FILES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Save the list for later use
            echo "$CHANGED_FILES" > /tmp/changed_go_mods.txt
          fi

      - name: Checkout engineering-governance repository
        if: steps.detect-changes.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: ranuka-laksika/engineering-governance
          path: engineering-governance
          ref: main

      - name: Extract and validate dependencies
        if: steps.detect-changes.outputs.has_changes == 'true'
        id: validate
        continue-on-error: true
        run: |
          chmod +x scripts/validate-go-dependencies.sh
          scripts/validate-go-dependencies.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "engineering-governance/dependency-registry/go.yaml"

      - name: Comment on PR - Validation Failed
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## Dependency Validation Failed\n\n';
            comment += 'This PR contains dependencies that are **not approved** or do not meet version requirements.\n\n';

            // Show all new dependencies
            if (fs.existsSync('/tmp/new_deps.txt')) {
              const newDeps = fs.readFileSync('/tmp/new_deps.txt', 'utf8').trim();
              if (newDeps) {
                comment += '### 📦 New Dependencies Added\n\n';
                const lines = newDeps.split('\n');
                for (const line of lines) {
                  if (line.trim()) {
                    comment += '- ' + line.trim() + '\n';
                  }
                }
                comment += '\n';
              }
            }

            // Show all updated dependencies
            if (fs.existsSync('/tmp/updated_deps.txt')) {
              const updatedDeps = fs.readFileSync('/tmp/updated_deps.txt', 'utf8').trim();
              if (updatedDeps) {
                comment += '### Updated Dependencies\n\n';
                const lines = updatedDeps.split('\n');
                for (const line of lines) {
                  if (line.trim()) {
                    comment += '- ' + line.trim() + '\n';
                  }
                }
                comment += '\n';
              }
            }

            // Show unapproved dependencies with reasons
            if (fs.existsSync('/tmp/unapproved_deps.txt')) {
              const unapproved = fs.readFileSync('/tmp/unapproved_deps.txt', 'utf8').trim();
              if (unapproved) {
                comment += '### Validation Failures\n\n';
                const lines = unapproved.split('\n');
                for (const line of lines) {
                  if (line.trim()) {
                    comment += '❌ ' + line.trim() + '\n\n';
                  }
                }
              }
            }

            comment += '---\n\n';
            comment += '### Next Steps\n\n';
            comment += '1. **Review** the validation failures listed above\n';
            comment += '2. **Check** if dependencies are in the [approved dependency list](https://github.com/ranuka-laksika/engineering-governance/blob/main/dependency-registry/go.yaml)\n';
            comment += '3. **Options to resolve:**\n';
            comment += '   - Remove the unapproved dependencies from this PR\n';
            comment += '   - OR submit a PR to add these dependencies to the approved list in engineering-governance\n';
            comment += '4. Once resolved, push changes to re-run validation\n\n';
            comment += '> **This PR is blocked until all dependencies are approved.**\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Comment on PR - Validation Passed
        if: steps.validate.outcome == 'success' && steps.detect-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## Dependency Validation Passed\n\n';
            comment += 'All dependencies have been validated against the approved list.\n\n';

            // Show all new dependencies
            if (fs.existsSync('/tmp/new_deps.txt')) {
              const newDeps = fs.readFileSync('/tmp/new_deps.txt', 'utf8').trim();
              if (newDeps) {
                comment += '### New Dependencies Added\n\n';
                const lines = newDeps.split('\n');
                for (const line of lines) {
                  if (line.trim()) {
                    comment += '- ' + line.trim() + '\n';
                  }
                }
                comment += '\n';
              }
            }

            // Show all updated dependencies
            if (fs.existsSync('/tmp/updated_deps.txt')) {
              const updatedDeps = fs.readFileSync('/tmp/updated_deps.txt', 'utf8').trim();
              if (updatedDeps) {
                comment += '### Updated Dependencies\n\n';
                const lines = updatedDeps.split('\n');
                for (const line of lines) {
                  if (line.trim()) {
                    comment += '- ' + line.trim() + '\n';
                  }
                }
                comment += '\n';
              }
            }

            // Show validated dependencies with approval details
            if (fs.existsSync('/tmp/validated_deps.txt')) {
              const validated = fs.readFileSync('/tmp/validated_deps.txt', 'utf8').trim();
              if (validated) {
                comment += '### Validation Details\n\n';
                const lines = validated.split('\n');
                for (const line of lines) {
                  if (line.trim()) {
                    comment += '✓ ' + line.trim() + '\n\n';
                  }
                }
              }
            }

            comment += '---\n\n';
            comment += '✨ **All dependencies are approved!** This PR can proceed.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Mark validation as passed
        if: steps.detect-changes.outputs.has_changes == 'false'
        run: |
          echo "No dependency changes detected - validation passed"

      - name: Fail job if validation failed
        if: steps.validate.outcome == 'failure'
        run: |
          echo "Dependency validation failed. Please review the comments on this PR."
          exit 1
