        config:
          $ref: "#/components/schemas/OAuthAppConfigComplete"
    OAuthAppConfig:
      type: object
      properties:
        clientId:
          type: string
          description: The client ID for the OAuth application.
          example: myapp_client_id
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: A list of redirect URIs for the OAuth application.
          example:
            - https://myapp.example.com/callback
            - https://myapp.example.com/oauth/callback
        grantTypes:
          type: array
          items:
            type: string
            enum:
              - authorization_code
              - client_credentials
              - refresh_token
              - implicit
              - password
              - urn:ietf:params:oauth:grant-type:token-exchange
          description: A list of grant types supported by the OAuth application. Defaults
            to ["authorization_code"] if not specified.
          example:
            - authorization_code
            - refresh_token
        responseTypes:
          type: array
          items:
            type: string
            enum:
